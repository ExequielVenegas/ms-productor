name: Pipeline CI/CD - MS Productor Cloud Native

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-containerize:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672

    steps:
    - name: 1. Descargar código fuente desde rama master (Checkout)
      uses: actions/checkout@v3

    - name: 2. Configurar JDK 17 (Temurin)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # --- NUEVO PASO DEVSECOPS: RECONSTRUIR WALLET DE ORACLE ---
    - name: 3. Decodificar y reconstruir Oracle Wallet desde Secret
      run: |
        mkdir -p src/main/resources/wallet
        echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 --decode > wallet.zip
        unzip -o wallet.zip -d src/main/resources/wallet/
        rm wallet.zip
        ls -la src/main/resources/wallet/ # Verificación en logs de que los archivos se crearon
    # -----------------------------------------------------------

    - name: 4. Compilar proyecto y Ejecutar Pruebas (Maven)
      env:
        SPRING_PROFILES_ACTIVE: default
        SPRING_RABBITMQ_HOST: localhost
        DB_URL: ${{ secrets.ORACLE_DB_URL }}
        DB_USERNAME: ${{ secrets.ORACLE_DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.ORACLE_DB_PASSWORD }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        S3_BUCKET_NAME: guias-despacho-ervr-2026
      run: mvn clean package -DskipTests=false

    - name: 5. Iniciar sesión en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 6. Construir y Publicar Imagen Docker (Push)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms-productor:latest
